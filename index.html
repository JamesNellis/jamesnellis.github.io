<!DOCTYPE html>
<html>
<body>
<div id="coords" style="position: absolute; white-space: pre;">NO MOVEMENT</div>
    <div id="follow" style="position: absolute;">O</div>
    <script>
        const maxwidth = window.innerWidth;
        const maxheight = window.innerHeight;
        let mouseX = 0;
        let mouseY = 0;
        let followX = -1;
        let followY = -1;
        let dx = 0;
        let dy = 0;
        let theta = 0;
        let dist = 0;
        let speed = 5; // pixels / frame
        let going = true;
        let mouseMoved = false;
        
        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;


            if (!mouseMoved){
                updateDisplay();
                mouseMoved = true;
            }
        });
        function updateDisplay() {
        
            if (followX === -1 && followY === -1) {
                while (!(((maxwidth > followX) && (followX > 0)) && ((maxheight > followY) && (followY > 0)))) {
                    let deg = Math.random() * 2 * Math.PI;
                    followX = mouseX + 300 * Math.cos(deg);
                    followY = mouseY + 300 * Math.sin(deg);
                }
            }

            const coords = document.getElementById('coords');
            const follow = document.getElementById('follow');
            
            //follower > mouse
            dx = mouseX - followX;
            dy = mouseY - followY;

            dist = Math.sqrt(dy**2 + dx**2);
            theta = Math.atan2(dy, dx) * (180 / Math.PI);


            followX += speed * (dx / dist);
            followY += speed * (dy / dist);
            
            
            
            coords.textContent = `Mouse: ${mouseX.toFixed(0)}, ${mouseY.toFixed(0)} | Follower: ${followX.toFixed(3)}, ${followY.toFixed(3)}\nTheta: ${theta.toFixed(3)} | Dist: ${dist.toFixed(3)}`;
            follow.style.left = followX + "px";   // left = X position
            follow.style.top = followY + "px";    // top = Y position

            if (dist < 5){
                going = false;
            }

            
            if (going){
                requestAnimationFrame(updateDisplay);
            }
        }
        
    </script>
</body>
</html>
