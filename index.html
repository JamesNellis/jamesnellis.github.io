<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James' Site</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            background-color: white;
            color: black;
            line-height: 0.5;
            margin: 0;
            padding: 20px;
        }
        
        .title {
            font-size: 24px;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="title">James Nellis' Site</div>
    <br>
    <br>
    <p>Contact: thejamesnellis@gmail.com
    <span id="copyButton" onclick="copyEmail()" style="
    color: blue;
    text-decoration: underline;
    cursor: pointer;
    margin-left: 8px;
    ">copy</span> </p>
    <script>
        function copyEmail() {
            navigator.clipboard.writeText('thejamesnellis@gmail.com');
            const button = document.getElementById('copyButton');
            button.textContent = 'copied';
            setTimeout(() => {
                button.textContent = 'copy';
            }, 1250);
        }
    </script>

</body>
</html>
